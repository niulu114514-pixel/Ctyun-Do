<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天翼云登录工作台</title>
    <style>
        :root {
            --bg-top: #f4efe7;
            --bg-bottom: #dbe6f6;
            --panel: rgba(255, 255, 255, 0.88);
            --panel-strong: rgba(255, 255, 255, 0.96);
            --text: #1d2935;
            --muted: #617282;
            --primary: #0f766e;
            --primary-dark: #0b5b55;
            --accent: #ea580c;
            --danger: #b42318;
            --danger-bg: rgba(180, 35, 24, 0.08);
            --success: #027a48;
            --success-bg: rgba(2, 122, 72, 0.1);
            --info: #155eef;
            --info-bg: rgba(21, 94, 239, 0.08);
            --border: rgba(29, 41, 53, 0.12);
            --shadow: 0 24px 80px rgba(41, 60, 87, 0.16);
            --radius: 28px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.95), transparent 38%),
                radial-gradient(circle at bottom right, rgba(15, 118, 110, 0.14), transparent 30%),
                linear-gradient(145deg, var(--bg-top), var(--bg-bottom));
            padding: 32px 20px;
        }

        .page {
            max-width: 760px;
            margin: 0 auto;
        }

        .panel {
            border: 1px solid rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(18px);
            box-shadow: var(--shadow);
        }

        .panel {
            border-radius: var(--radius);
            background: var(--panel);
            padding: 28px;
            display: flex;
            flex-direction: column;
            gap: 22px;
            min-height: 720px;
        }

        .panel-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
        }

        .panel-top h2 {
            font-size: 28px;
            line-height: 1.15;
        }

        .panel-top p {
            margin-top: 8px;
            color: var(--muted);
            line-height: 1.6;
            font-size: 14px;
        }

        .badge {
            flex-shrink: 0;
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(15, 118, 110, 0.1);
            color: var(--primary);
            font-size: 12px;
            font-weight: 700;
        }

        .message {
            display: none;
            border-radius: 18px;
            padding: 14px 16px;
            border: 1px solid transparent;
            line-height: 1.6;
            font-size: 14px;
        }

        .message.active { display: block; }
        .message.error { background: var(--danger-bg); color: var(--danger); border-color: rgba(180, 35, 24, 0.16); }
        .message.success { background: var(--success-bg); color: var(--success); border-color: rgba(2, 122, 72, 0.18); }
        .message.info { background: var(--info-bg); color: var(--info); border-color: rgba(21, 94, 239, 0.16); }

        .form-card,
        .result-card {
            background: var(--panel-strong);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
        }

        .stack {
            display: grid;
            gap: 18px;
        }

        .field label {
            display: block;
            margin-bottom: 9px;
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
        }

        .field input {
            width: 100%;
            border: 1px solid rgba(29, 41, 53, 0.14);
            background: rgba(250, 251, 252, 0.95);
            color: var(--text);
            border-radius: 16px;
            padding: 15px 16px;
            font-size: 15px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
        }

        .field input:focus {
            outline: none;
            border-color: rgba(15, 118, 110, 0.48);
            box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.12);
            transform: translateY(-1px);
        }

        .helper-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.5;
        }

        .sms-section {
            display: none;
            padding: 18px;
            border-radius: 20px;
            background: linear-gradient(135deg, rgba(15, 118, 110, 0.08), rgba(234, 88, 12, 0.08));
            border: 1px dashed rgba(15, 118, 110, 0.28);
        }

        .sms-section.active { display: block; }

        .sms-title {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .btn-row {
            display: flex;
            gap: 12px;
        }

        .btn,
        .ghost-btn {
            border: none;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
        }

        .btn {
            flex: 1;
            padding: 16px 18px;
            color: #fff;
            background: linear-gradient(135deg, var(--primary), #138a7e);
            box-shadow: 0 14px 32px rgba(15, 118, 110, 0.25);
        }

        .ghost-btn {
            padding: 16px 18px;
            background: rgba(29, 41, 53, 0.06);
            color: var(--text);
        }

        .btn:hover,
        .ghost-btn:hover {
            transform: translateY(-1px);
        }

        .btn:disabled,
        .ghost-btn:disabled {
            opacity: 0.65;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .loading {
            display: inline-block;
            width: 18px;
            height: 18px;
            margin-right: 8px;
            vertical-align: -3px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .result-card {
            display: none;
            min-height: 0;
            flex: 1;
        }

        .result-card.active { display: flex; flex-direction: column; }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
        }

        .result-header h3 {
            font-size: 18px;
        }

        .result-header p {
            margin-top: 4px;
            font-size: 13px;
            color: var(--muted);
        }

        .copy-btn {
            border: none;
            border-radius: 14px;
            background: rgba(15, 118, 110, 0.1);
            color: var(--primary);
            padding: 12px 16px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }

        pre {
            flex: 1;
            min-height: 300px;
            max-height: 420px;
            overflow: auto;
            padding: 18px;
            border-radius: 20px;
            background: #10212b;
            color: #d7f9f4;
            border: 1px solid rgba(16, 33, 43, 0.18);
            font-size: 12px;
            line-height: 1.65;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(-10px);
            padding: 12px 18px;
            border-radius: 999px;
            background: rgba(16, 33, 43, 0.92);
            color: #fff;
            font-size: 13px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease, transform 0.25s ease;
            z-index: 20;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 640px) {
            body { padding: 14px; }
            .panel,
            .form-card,
            .result-card {
                border-radius: 22px;
            }
            .panel {
                padding: 22px;
            }
            .btn-row,
            .result-header,
            .panel-top,
            .helper-row {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <main class="panel">
            <div class="panel-top">
                <div>
                    <h2>天翼云登录工作台</h2>
                    <p>输入账号后开始登录。若触发设备验证，系统会保留当前浏览器会话并等待短信验证码。</p>
                </div>
                <span class="badge" id="statusBadge">Ready</span>
            </div>

            <div id="message" class="message"></div>

            <section class="form-card">
                <form id="loginForm" class="stack">
                    <div class="field">
                        <label for="phone">手机号</label>
                        <input type="text" id="phone" placeholder="请输入手机号" autocomplete="username" required>
                    </div>

                    <div class="field">
                        <label for="password">密码</label>
                        <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password" required>
                    </div>

                    <div class="helper-row">
                        <span>支持多人同时使用</span>
                        <span id="sessionLabel">当前无待验证会话</span>
                    </div>

                    <div class="sms-section" id="smsSection">
                        <div class="sms-title">短信验证已触发</div>
                        <div class="field">
                            <label for="smsCode">短信验证码</label>
                            <input type="text" id="smsCode" placeholder="请输入收到的验证码" inputmode="numeric">
                        </div>
                    </div>

                    <div class="btn-row">
                        <button type="submit" class="btn" id="submitBtn">开始登录</button>
                        <button type="button" class="ghost-btn" id="resetBtn">重置状态</button>
                    </div>
                </form>
            </section>

            <section class="result-card" id="resultSection">
                <div class="result-header">
                    <div>
                        <h3>原始响应 JSON</h3>
                        <p>这里展示接口返回的完整原始文本，不做重组和美化改写。</p>
                    </div>
                    <button class="copy-btn" id="copyBtn" type="button">复制原始 JSON</button>
                </div>
                <pre id="jsonOutput"></pre>
            </section>
        </main>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const form = document.getElementById('loginForm');
        const messageEl = document.getElementById('message');
        const smsSection = document.getElementById('smsSection');
        const submitBtn = document.getElementById('submitBtn');
        const resetBtn = document.getElementById('resetBtn');
        const resultSection = document.getElementById('resultSection');
        const jsonOutput = document.getElementById('jsonOutput');
        const copyBtn = document.getElementById('copyBtn');
        const toast = document.getElementById('toast');
        const statusBadge = document.getElementById('statusBadge');
        const sessionLabel = document.getElementById('sessionLabel');

        let pendingSessionId = '';
        let fullJson = '';

        function showToast(text) {
            toast.textContent = text;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2200);
        }

        function showMessage(text, type = '') {
            if (!text) {
                messageEl.textContent = '';
                messageEl.className = 'message';
                return;
            }
            messageEl.textContent = text;
            messageEl.className = 'message active ' + type;
        }

        function updateStatus(text, tone = 'ready') {
            statusBadge.textContent = text;
            const colors = {
                ready: ['rgba(15, 118, 110, 0.1)', '#0f766e'],
                pending: ['rgba(21, 94, 239, 0.12)', '#155eef'],
                success: ['rgba(2, 122, 72, 0.12)', '#027a48'],
                error: ['rgba(180, 35, 24, 0.12)', '#b42318']
            };
            const [bg, color] = colors[tone] || colors.ready;
            statusBadge.style.background = bg;
            statusBadge.style.color = color;
        }

        function setLoading(loading) {
            submitBtn.disabled = loading;
            resetBtn.disabled = loading;
            const buttonText = pendingSessionId ? '提交验证码' : '开始登录';
            submitBtn.innerHTML = loading ? '<span class="loading"></span>处理中' : buttonText;
        }

        function setPendingSession(sessionId) {
            pendingSessionId = sessionId || '';
            const active = Boolean(pendingSessionId);
            smsSection.classList.toggle('active', active);
            sessionLabel.textContent = active ? `待验证会话: ${pendingSessionId}` : '当前无待验证会话';
            submitBtn.textContent = active ? '提交验证码' : '开始登录';
        }

        function resetState() {
            setPendingSession('');
            fullJson = '';
            resultSection.classList.remove('active');
            jsonOutput.textContent = '';
            document.getElementById('smsCode').value = '';
            showMessage('', '');
            updateStatus('Ready', 'ready');
        }

        async function requestLogin(payload, url) {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const rawText = await response.text();
            let parsed = null;
            if (response.status !== 200) {
                try {
                    parsed = JSON.parse(rawText);
                } catch (error) {
                    parsed = { message: rawText || '请求失败' };
                }
            }

            return { response, rawText, parsed };
        }

        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(fullJson).then(() => showToast('复制成功')).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = fullJson;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('复制成功');
            });
        });

        resetBtn.addEventListener('click', () => {
            form.reset();
            resetState();
        });

        form.addEventListener('submit', async (event) => {
            event.preventDefault();

            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const smsCode = document.getElementById('smsCode').value.trim();

            if (!phone || !password) {
                showMessage('请输入手机号和密码', 'error');
                updateStatus('Error', 'error');
                return;
            }

            if (pendingSessionId && !smsCode) {
                showMessage('请输入短信验证码', 'error');
                updateStatus('Error', 'error');
                return;
            }

            setLoading(true);
            showMessage('', '');
            if (!pendingSessionId) {
                resultSection.classList.remove('active');
            }
            updateStatus(pendingSessionId ? 'Verifying' : 'Logging In', 'pending');

            try {
                const targetUrl = pendingSessionId ? '/api/login/verify' : '/api/login';
                const payload = pendingSessionId
                    ? { session_id: pendingSessionId, sms_code: smsCode }
                    : { phone, password };

                const { response, rawText, parsed } = await requestLogin(payload, targetUrl);

                if (response.status === 200) {
                    fullJson = rawText;
                    jsonOutput.textContent = rawText;
                    resultSection.classList.add('active');
                    setPendingSession('');
                    showMessage('登录成功，已返回原始 JSON 数据', 'success');
                    updateStatus('Success', 'success');
                    return;
                }

                if (response.status === 202 && parsed && parsed.data && parsed.data.session_id) {
                    setPendingSession(parsed.data.session_id);
                    showMessage(parsed.message || '需要短信验证码，请继续提交', 'info');
                    updateStatus('Waiting SMS', 'pending');
                    document.getElementById('smsCode').focus();
                    return;
                }

                showMessage((parsed && parsed.message) || '登录失败', 'error');
                updateStatus('Error', 'error');
            } catch (error) {
                showMessage('网络错误: ' + error.message, 'error');
                updateStatus('Error', 'error');
            } finally {
                setLoading(false);
            }
        });

        resetState();
    </script>
</body>
</html>
